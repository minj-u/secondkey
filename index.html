<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 패션 소비 & 관리 유형은? | SECOND KEY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2D6A4F;
    --green-dark: #085041;
    --green-light: #E1F5EE;
    --green-mid: #52B788;
    --white: #ffffff;
    --gray-bg: #F7F8F6;
    --gray-border: #DDE4DC;
    --gray-text: #6B7C6A;
    --text: #1A2E1A;
  }

  html, body {
    min-height: 100%;
    background: var(--gray-bg);
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    color: var(--text);
    padding-bottom: 3rem;
  }

  /* ── TOP BAR ── */
  .top-bar {
    background: var(--green);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .top-bar-logo {
    color: rgba(255,255,255,0.9);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .top-bar-dot {
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }
  .top-bar-sub {
    color: rgba(255,255,255,0.65);
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, var(--green) 0%, #1B4332 100%);
    padding: 2.5rem 1.5rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 1rem;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .hero-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(22px, 6vw, 30px);
    color: #fff;
    line-height: 1.3;
    margin-bottom: 0.6rem;
  }
  .hero-title em {
    color: #95D5B2;
    font-style: normal;
  }
  .hero-desc {
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 1.8rem;
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  .hero-meta-item {
    text-align: center;
  }
  .hero-meta-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: #95D5B2;
  }
  .hero-meta-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* ── QUIZ CARD ── */
  #sk-root {
    max-width: 520px;
    margin: 0 auto;
    padding: 1.5rem 1rem 1rem;
  }

  .prog-wrap { margin-bottom: 0.4rem; }
  .prog-bar {
    height: 5px;
    background: var(--gray-border);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green-mid), var(--green));
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
  }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    margin-bottom: 1.2rem;
  }
  .prog-label {
    font-size: 12px;
    color: var(--gray-text);
  }
  .prog-pct {
    font-size: 12px;
    color: var(--green);
    font-weight: 700;
  }

  .qbox {
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--gray-border);
    border-top: 3px solid var(--green);
    padding: 1.6rem 1.4rem 1.4rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 12px rgba(45,106,79,0.07);
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .q-scene { font-size: 36px; text-align: center; margin-bottom: 0.8rem; }
  .q-text {
    font-size: 16px;
    font-weight: 800;
    text-align: center;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── OPTIONS ── */
  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .opt {
    background: var(--white);
    border: 1.5px solid var(--gray-border);
    border-radius: 13px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s ease;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .opt:hover {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green-dark);
    transform: translateX(4px);
    box-shadow: 0 2px 10px rgba(45,106,79,0.12);
  }
  .opt.sel {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700;
    transform: translateX(4px);
    box-shadow: 0 2px 10px rgba(45,106,79,0.12);
  }
  .opt-ico { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }

  /* ── BACK BUTTON ── */
  .btn-back {
    width: 100%;
    padding: 11px;
    border-radius: 13px;
    border: 1.5px solid var(--gray-border);
    background: transparent;
    color: var(--gray-text);
    font-size: 13px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 8px;
    display: none;
  }
  .btn-back:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-light);
  }

  /* ── NEXT BUTTON ── */
  .btn-next {
    width: 100%;
    padding: 14px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff;
    font-size: 15px;
    font-family: 'Black Han Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    box-shadow: 0 3px 12px rgba(45,106,79,0.3);
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 18px rgba(45,106,79,0.35);
  }
  .btn-next:disabled {
    background: var(--gray-border);
    color: var(--gray-text);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── RESULT ── */
  #sk-result { display: none; animation: fadeUp 0.5s ease; }

  .res-card {
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(45,106,79,0.1);
    margin-bottom: 1rem;
  }
  .res-header {
    background: linear-gradient(150deg, var(--green) 0%, #1B4332 100%);
    padding: 2.2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .res-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .res-avatar { font-size: 68px; display: block; margin-bottom: 0.6rem; }
  .res-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 11px;
    padding: 3px 14px;
    border-radius: 99px;
    margin-bottom: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .res-type {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 26px;
    color: #fff;
    margin-bottom: 0.2rem;
  }
  .res-eng {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }

  .res-body { padding: 1.5rem; }
  .res-desc {
    font-size: 14px;
    line-height: 1.85;
    color: var(--gray-text);
    margin-bottom: 1.4rem;
  }

  .guide-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .guide-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.3rem; }
  .guide-item {
    background: var(--green-light);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--green-dark);
    line-height: 1.6;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .guide-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 7px;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.3rem; }
  .tag {
    background: var(--gray-bg);
    color: var(--gray-text);
    font-size: 12px;
    padding: 4px 11px;
    border-radius: 99px;
    border: 1px solid var(--gray-border);
  }

  .divider { height: 1px; background: var(--gray-border); margin-bottom: 1.3rem; }

  .score-title {
    font-size: 12px;
    color: var(--gray-text);
    margin-bottom: 12px;
    text-align: center;
    font-weight: 700;
  }
  .score-bars { display: flex; flex-direction: column; gap: 9px; }
  .score-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .score-label { min-width: 68px; color: var(--gray-text); }
  .score-track {
    flex: 1; height: 7px;
    background: var(--gray-bg);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--gray-border);
  }
  .score-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green-mid), var(--green));
    transition: width 0.7s cubic-bezier(.4,0,.2,1);
  }
  .score-val { min-width: 32px; text-align: right; font-weight: 800; color: var(--green); }

  .btn-restart {
    width: 100%;
    padding: 13px;
    border-radius: 13px;
    border: 1.5px solid var(--gray-border);
    background: transparent;
    color: var(--gray-text);
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-restart:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-light);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 1.5rem 1rem 0;
    color: var(--gray-text);
    font-size: 11px;
    line-height: 1.8;
  }
</style>
</head>

  A:{name:"합리적 소비러",eng:"SMART CONSUMER",avatar:"⚖️",badge:"합리 소비 타입",
    desc:"구매 전 반드시 옷장을 확인하고, 3가지 이상 코디가 가능한 아이템만 선택하는 현명한 소비자예요. 온라인 쇼핑 시 후기·사이즈 실측을 꼼꼼히 챙기고 반품도 두려워하지 않아요.",
    guides:["구매 전 옷장 열어보기 — 3가지 코디 불가능하면 패스!","온라인 구매 시 나와 비슷한 체형 후기 꼭 확인","캡슐 워드로브 도전 — 뉴트럴 베이직 10벌로 수십 가지 코디","실패해도 OK, 반품을 두려워하지 마세요"],
    tags:["#합리적소비","#옷장정리","#코디호환","#반품OK","#캡슐워드로브"]},
  B:{name:"순환 패션러",eng:"CIRCULAR FASHIONER",avatar:"♻️",badge:"지속가능 소비 타입",
    desc:"더 이상 입지 않는 옷을 버리지 않고 중고 플랫폼에서 순환시키는 환경 의식 패셔니스타! '후루츠패밀리', '빈티지샵' 등 세컨핸드를 적극 활용하고, 깨끗하게 입은 뒤 판매하는 선순환을 실천해요.",
    guides:["안 입는 옷은 당근·번개장터·세컨웨어로 순환","중고 구매 시 어깨선·품은 수선 어려우니 반드시 착용 확인","구제시장 탐방 전 내 치수(가슴·허리·엉덩이 cm) 미리 파악","냄새(곰팡이·담배·땀)는 세탁으로 제거 어려우니 꼭 확인"],
    tags:["#중고패션","#세컨핸드","#순환경제","#빈티지","#친환경소비"]},
  C:{name:"충동 구매러",eng:"IMPULSE BUYER",avatar:"⚡",badge:"소비 습관 개선 타입",
    desc:"트렌드에 민감하고 마음에 들면 바로 구매하는 스타일! 하지만 옷장엔 한 번도 안 입은 옷이 쌓여가고 있을지도 몰라요. 작은 습관 변화만으로도 지갑과 환경을 동시에 지킬 수 있어요.",
    guides:["구매 전 24시간 기다리기 — 그래도 사고 싶으면 그때 구매","얼룩 관리법 배우기 — 음식물은 찬물로 헹군 뒤 액체세제","안 입는 옷 판매 습관 들이기 — 옷을 '소모품'이 아닌 '자산'으로","가격보다 '진짜 필요한가?'를 먼저 생각해보기"],
    tags:["#소비습관개선","#충동구매","#옷장다이어트","#30번착용법","#절약"]},
  D:{name:"품질 관리 전문가",eng:"QUALITY KEEPER",avatar:"💎",badge:"품질 케어 타입",
    desc:"'싸게 여러 벌 < 좋은 옷 한 벌'을 실천하는 퀄리티 마스터! 소재(천연섬유)와 디테일(봉제선·지퍼)을 꼼꼼히 확인하고, 케어라벨대로 세탁·보관하는 옷의 수명을 극대화하는 관리 고수예요.",
    guides:["케어라벨 세탁법 필수 확인 — 좋은 옷의 수명 연장법","얼룩별 처리법: 기름→주방세제, 커피→찬물, 잉크→알코올","니트는 접어서 보관, 직사광선 피하기","간단한 수선(단추 교체·밑단 처리)으로 옷 가치 크게 올리기"],
    tags:["#품질우선","#케어라벨","#천연섬유","#얼룩관리","#오래입기"]},
};

let cur=0, chosen=null, scores={A:0,B:0,C:0,D:0}, history=[];

function render(){
  const q=qs[cur];
  const pct=Math.round((cur/qs.length)*100);
  document.getElementById('sk-prog').style.width=pct+'%';
  document.getElementById('sk-qnum').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('sk-pct').textContent=pct+'%';
  document.getElementById('sk-scene').textContent=q.scene;
  document.getElementById('sk-qtext').textContent=q.q;
  chosen=null;
  document.getElementById('sk-next').disabled=true;
  document.getElementById('sk-back').style.display=cur>0?'block':'none';
  const c=document.getElementById('sk-opts');
  c.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-ico">${o.e}</span><span>${o.t}</span>`;
    b.onclick=()=>sel(i,b);
    c.appendChild(b);
  });
}

function sel(i,btn){
  chosen=i;
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('sk-next').disabled=false;
}

function nextQ(){
  if(chosen===null)return;
  const s=qs[cur].opts[chosen].s;
  history.push({scores:{...scores}, chosen});
  for(let k in s) scores[k]+=s[k];
  cur++;
  if(cur<qs.length){ render(); }
  else{ showResult(); }
}

function prevQ(){
  if(cur===0)return;
  cur--;
  const prev=history.pop();
  scores=prev.scores;
  render();
}

function showResult(){
  document.getElementById('sk-quiz').style.display='none';
  const rd=document.getElementById('sk-result');
  rd.style.display='block';
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const t=types[top];
  const maxScore=qs.length*3;
  const pct=k=>Math.round((scores[k]/maxScore)*100);

  rd.innerHTML=`
    <div class="res-card">
      <div class="res-header">
        <span class="res-avatar">${t.avatar}</span>
        <span class="res-badge">${t.badge}</span>
        <div class="res-type">${t.name}</div>
        <div class="res-eng">${t.eng}</div>
      </div>
      <div class="res-body">
        <div class="res-desc">${t.desc}</div>
        <div class="guide-title">✅ 나를 위한 소비·관리 가이드</div>
        <div class="guide-list">${t.guides.map(g=>`<div class="guide-item"><div class="guide-dot"></div><span>${g}</span></div>`).join('')}</div>
        <div class="tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
        <div class="divider"></div>
        <div class="score-title">나의 패션 소비 성향 분석</div>
        <div class="score-bars">
          ${[['A','합리적 소비'],['B','순환 소비'],['C','충동 소비'],['D','품질 관리']].map(([k,label])=>`
          <div class="score-row">
            <span class="score-label">${label}</span>
            <div class="score-track"><div class="score-fill" style="width:${pct(k)}%"></div></div>
            <span class="score-val">${pct(k)}%</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">↩ 다시 테스트하기</button>
  `;
}

function restart(){
  cur=0; chosen=null; scores={A:0,B:0,C:0,D:0}; history=[];
  document.getElementById('sk-quiz').style.display='block';
  document.getElementById('sk-result').style.display='none';
  render();
}

render();
</script>
</body>
</html>
