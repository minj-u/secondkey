<style>

  :root {
    --green: #2D6A4F;
    --green-dark: #085041;
    --green-light: #E1F5EE;
    --green-mid: #52B788;
    --white: #ffffff;
    --gray-bg: #F7F8F6;
    --gray-border: #DDE4DC;
    --gray-text: #6B7C6A;
    --text: #1A2E1A;
  }

  html, body {
    min-height: 100%;
    background: var(--gray-bg);
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    color: var(--text);
    padding-bottom: 3rem;
  }

  .top-bar {
    background: var(--green);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .top-bar-logo {
    color: rgba(255,255,255,0.9);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .top-bar-dot {
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }
  .top-bar-sub {
    color: rgba(255,255,255,0.65);
    font-size: 11px;
    letter-spacing: 0.5px;
  }

    padding: 2.5rem 1.5rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 1rem;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .hero-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(22px, 6vw, 30px);
    color: #fff;
    line-height: 1.3;
    margin-bottom: 0.6rem;
  }
  .hero-title em {
    color: #95D5B2;
    font-style: normal;
  }
  .hero-desc {
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 1.8rem;
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  .hero-meta-item {
    text-align: center;
  }
  .hero-meta-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: #95D5B2;
  }
  .hero-meta-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* ── QUIZ CARD ── */
  #sk-root {
    max-width: 520px;
    margin: 0 auto;
    padding: 1.5rem 1rem 1rem;
  }

  .prog-wrap { margin-bottom: 0.4rem; }
  .prog-bar {
    height: 5px;
    background: var(--gray-border);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green-mid), var(--green));
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
  }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    margin-bottom: 1.2rem;
  }
  .prog-label {
    font-size: 12px;
    color: var(--gray-text);
  }
  .prog-pct {
    font-size: 12px;
    color: var(--green);
    font-weight: 700;
  }

  .qbox {
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--gray-border);
    border-top: 3px solid var(--green);
    padding: 1.6rem 1.4rem 1.4rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 12px rgba(45,106,79,0.07);
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .q-scene { font-size: 36px; text-align: center; margin-bottom: 0.8rem; }
  .q-text {
    font-size: 16px;
    font-weight: 800;
    text-align: center;
    line-height: 1.6;
    color: var(--text);
  }

  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .opt {
    background: var(--white);
    border: 1.5px solid var(--gray-border);
    border-radius: 13px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s ease;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .opt:hover {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green-dark);
    transform: translateX(4px);
    box-shadow: 0 2px 10px rgba(45,106,79,0.12);
  }
  .opt.sel {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700;
    transform: translateX(4px);
    box-shadow: 0 2px 10px rgba(45,106,79,0.12);
  }
  .opt-ico { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }

  /* ── BACK BUTTON ── */
  .btn-back {
    width: 100%;
    padding: 11px;
    border-radius: 13px;
    border: 1.5px solid var(--gray-border);
    background: transparent;
    color: var(--gray-text);
    font-size: 13px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 8px;
    display: none;
  }
  .btn-back:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-light);
  }

  /* ── NEXT BUTTON ── */
  .btn-next {
    width: 100%;
    padding: 14px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff;
    font-size: 15px;
    font-family: 'Black Han Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    box-shadow: 0 3px 12px rgba(45,106,79,0.3);
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 18px rgba(45,106,79,0.35);
  }
  .btn-next:disabled {
    background: var(--gray-border);
    color: var(--gray-text);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  #sk-result { display: none; animation: fadeUp 0.5s ease; }

  .res-card {
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(45,106,79,0.1);

    color: #fff;

  .res-desc {

    line-height: 1.85;
    color: var(--gray-text);
    margin-bottom: 1.4rem;

    font-weight: 700;

    font-size: 12px;

  .score-title {

    background: var(--gray-bg);
    border-radius: 99px;

    border: 1px solid var(--gray-border);

    height: 100%;
    border-radius: 99px;

  .score-val { min-width: 32px; text-align: right; font-weight: 800; color: var(--green); }

  .btn-restart {
    width: 100%;
    padding: 13px;
    border-radius: 13px;
    border: 1.5px solid var(--gray-border);
    background: transparent;
    color: var(--gray-text);
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-restart:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-light);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 1.5rem 1rem 0;
    color: var(--gray-text);
    font-size: 11px;
    line-height: 1.8;
  }
</style>
</head>

      "세탁 전 케어 라벨 확인 습관 들이기 — 소재별로 수온·코스 다르게!",
      "안 입는 옷은 버리기 전에 당근마켓·번개장터에 먼저 올려보기",
      "간단한 수선(단추 교체·밑단 처리)으로 옷의 가치와 수명 크게 올리기"
    ],
    tags:["#입문자","#슬로우패션","#72시간룰","#중고패션","#수선"]},
  C:{name:"🔥 패스트 패션 소비자",eng:"FAST FASHION CONSUMER",avatar:"🔥",badge:"작은 습관 하나부터 바꿔봐요!",
    desc:"지금은 패스트 패션 소비 패턴에 익숙하지만, 작은 변화 하나만으로도 큰 차이를 만들 수 있어요. 옷장 속 한 번도 안 입은 옷들이 있다면, 오늘부터 슬로우 패션을 시작해볼 타이밍이에요!",
    guides:[
      "구매 전 72시간 기다리기 — 3일 뒤에도 여전히 원한다면, 그때 구매해도 늦지 않아요",
      "구매 기준 세우기 — '10번 이상 입을 수 있나? 지금 가진 옷 3가지와 코디 가능한가?' 두 가지 질문 먼저!",
      "세탁 전 분류 습관 — 흰옷·밝은색·어두운색 분리, 지퍼는 잠그고 니트·속옷은 세탁망에",
      "소재별 세탁 온도 기억하기 — 울·실크는 찬물 손세탁, 면은 30~40℃, 뜨거운 물은 수축의 원인!",
      "얼룩 즉시 처리 — 음식물→찬물+액체세제, 기름→주방세제, 커피·차→찬물 헹굼 후 세제, 세게 문지르면 섬유 손상!",
      "보관도 관리다 — 니트는 접어서 보관(걸면 늘어남), 직사광선 피하고 방습제로 습기 차단"
    ],
    tags:["#패스트패션","#습관개선","#세탁법","#구매기준","#슬로우패션시작"]},
};

// A가 5개 이상: 슬로우 패션 실천자, C가 3개 이상: 패스트 패션 소비자, 나머지: 입문자
function getResultType(scores){
  if(scores.A>=5) return 'A';
  if(scores.C>=3) return 'C';
  return 'B';
}

let cur=0, chosen=null, scores={A:0,B:0,C:0}, history=[];

function render(){
  const q=qs[cur];
  const pct=Math.round((cur/qs.length)*100);
  document.getElementById('sk-prog').style.width=pct+'%';
  document.getElementById('sk-qnum').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('sk-pct').textContent=pct+'%';
  document.getElementById('sk-scene').textContent=q.scene;
  document.getElementById('sk-qtext').textContent=q.q;
  chosen=null;
  document.getElementById('sk-next').disabled=true;
  document.getElementById('sk-back').style.display=cur>0?'block':'none';
  const c=document.getElementById('sk-opts');
  c.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-ico">${o.e}</span><span>${o.t}</span>`;
    b.onclick=()=>sel(i,b);
    c.appendChild(b);
  });
}

function sel(i,btn){
  chosen=i;
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('sk-next').disabled=false;
}

function nextQ(){
  if(chosen===null)return;
  const s=qs[cur].opts[chosen].s;
  history.push({scores:{...scores}, chosen});
  for(let k in s) scores[k]+=s[k];
  cur++;
  if(cur<qs.length){ render(); }
  else{ showResult(); }
}

function prevQ(){
  if(cur===0)return;
  cur--;
  const prev=history.pop();
  scores=prev.scores;
  render();
}

function showResult(){
  document.getElementById('sk-quiz').style.display='none';
  const rd=document.getElementById('sk-result');
  rd.style.display='block';
  const top=getResultType(scores);
  const t=types[top];
  const maxScore=qs.length*2;
  const pct=k=>Math.round((scores[k]/maxScore)*100);

  rd.innerHTML=`
    <div class="res-card">
      <div class="res-header">
        <span class="res-avatar">${t.avatar}</span>
        <span class="res-badge">${t.badge}</span>
        <div class="res-type">${t.name}</div>
        <div class="res-eng">${t.eng}</div>
      </div>
      <div class="res-body">
        <div class="res-desc">${t.desc}</div>
        <div class="guide-title">✅ 나를 위한 슬로우 패션 가이드</div>
        <div class="guide-list">${t.guides.map(g=>`<div class="guide-item"><div class="guide-dot"></div><span>${g}</span></div>`).join('')}</div>
        <div class="tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
        <div class="divider"></div>
        <div class="score-title">나의 패션 소비 성향 분석</div>
        <div class="score-bars">
          ${[['A','슬로우 패션 실천'],['B','입문·중간'],['C','패스트 패션']].map(([k,label])=>`
          <div class="score-row">
            <span class="score-label">${label}</span>
            <div class="score-track"><div class="score-fill" style="width:${pct(k)}%"></div></div>
            <span class="score-val">${pct(k)}%</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">↩ 다시 테스트하기</button>
  `;
}

function restart(){
  cur=0; chosen=null; scores={A:0,B:0,C:0}; history=[];
  document.getElementById('sk-quiz').style.display='block';
  document.getElementById('sk-result').style.display='none';
  render();
}

render();
</script>
